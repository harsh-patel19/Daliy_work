<h2>LOGIN</h2>

<form method="post">
{% csrf_token %}

Username:
<input type="text" name="username"><br><br>

Password:
<input type="password" name="password"><br><br>

<button type="submit">Login</button>

</form>

{% if error %}
<p style="color:rgb(255, 17, 17)">{{error}}</p>
{% endif %}

<a href="{%url 'register' %}">register</a>
