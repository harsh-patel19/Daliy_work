<h2>Register</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="username"><br>
    <input type="email" name="email"><br>
    <input type="password" name="password"><br>
    <button type="submit">Register</button>
</form>

<p style="color:red;">{{ error }}</p>
<a href="/login/">Login</a>
