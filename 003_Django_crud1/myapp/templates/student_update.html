<h2>UPDATE STUDENT</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    Name: <input type="text" name="name" value="{{Students.name}}"><br><br>
    Email: <input type="text" name="email" value="{{Students.email}}"><br><br>
    Coruse: <input type="text" name="course" value="{{Students.course}}"><br><br>

    {% if Students.image %}
        <img src="{{ Students.image.url }}" width="100"><br><br>
    {%endif%}

    change photo: <input type="file" name="image"><br><br>
    <button type="submit">update</button>
</form>
