<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>STUDENT DETAILS</h2>
    <form method="POST" enctype="multipart/form-data">
       {% csrf_token %}
        Name:<input type="text" name="name" value="{{ Students.name }}"><br><br>
        Email:<input type="text" name="email" value="{{ Students.email }}"><br><br>
        Age:<input type="number" name="age" value="{{ Students.age }}"><br><br>
        Phone:<input type="number" name="phone" value="{{ Students.phone }}"><br><br>

        OLD IMAGE:
        {% if Students.image %}
            <img src="{{ Students.image.url }}" width="100"><br><br>
        {% endif %}

        NEW IMAGE:<input type="file" name="image"><br><br>
        <button type="submit">UPDATE</button><br><br>

        <a href="{% url 'student_list'%}">BACK</a>
    </form>
