<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

    <h3>LOGIN FORM</h3>

    <form method="POST">

        {% csrf_token %}

        Username :
        <input type="text" name="username">
        <br><br>

        Password :
        <input type="password" name="password">
        <br><br>

        <button type="submit">LOGIN</button>

        <a href="{% url 'register' %}">
            register here..
        </a>

    </form>

</body>
</html>
