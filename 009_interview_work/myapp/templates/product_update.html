<!DOCTYPE html>
<html>
<head>
    <title>Update Product</title>
</head>
<body>

    <h2>Update Product</h2>

    <form method="POST">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="name" value="{{ Products.name }}" required><br><br>

        <label>Price:</label>
        <input type="number" name="price" value="{{ Products.price }}"><br><br>

        <label>Quantity:</label>
        <input type="number" name="qty" value="{{ Products.qty }}" required><br><br>

        <button type="submit">Update</button>
    </form>

    <br>
    <a href="{% url 'product_list' %}">Back to List</a>

</body>
</html>
