<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>PRODUCT DETAILS</h3>
    <form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
        name: <input type="text" name="name"><br><br>
        qty: <input type="number" name="qty"><br><br>
        price: <input type="number" name="price"><br><br>
        dec: <input type="text" name="dec"><br><br>
        image: <input type="file" name="image"><br><br>

        <button type="submit">ADD DATA</button>
    </form>
    <h3 align="center">LIST ALL DATA</h3>
    <table border="2" align="center">
        <tr>
            <th>name</th>
            <th>qty</th>
            <th>price</th>
            <th>dec</th>
            <th>image</th>
            <th>action</th>
        </tr>
        {% for p in products %}
        <tr>
            <td>{{p.name}}</td>
            <td>{{p.qty}}</td>
            <td>{{p.price}}</td>
            <td>{{p.dec}}</td>
            {% if p.image %}
            <td>
                <img src="{{p.image.url}}" width="100" height="100"><br><br>
            {% else %}
                no image:
            </td>
            {% endif%}
            <td>
                <a href="{% url 'update' p.id %}">EDit</a>
                <a href="{% url 'delete' p.id %}">DElete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
