<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>PRODUCT DETAILS</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        NAME: <input type="text" name="name" value="{{Products.name}}"><br><br>
        Email: <input type="text" name="email" value="{{Products.email}}"><br><br>
        AGE: <input type="number" name="age" value="{{Products.age}}"><br><br>

        {% if Products.image %}
            <img src="{{ Products.image.url }}" width="100"><br><br>
        {% endif %}
        
        NEW IMAGE: <input type="file" name="image"><br><br>

        <button type="submit">UPDATE</button>
    </form>
</body>
</html>
