<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HMS - {% block title %}{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }

    .navbar {
      background: #2c3e50;
      color: white;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 { font-size: 18px; }
    .navbar a { color: white; text-decoration: none; font-size: 14px; }
    .navbar a:hover { text-decoration: underline; }

    .wrapper { display: flex; }

    .sidebar {
      width: 200px;
      background: #34495e;
      min-height: calc(100vh - 50px);
      padding: 20px 0;
    }
    .sidebar a {
      display: block;
      padding: 12px 20px;
      color: #ecf0f1;
      text-decoration: none;
      font-size: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar a:hover { background: #2c3e50; }
    .sidebar a.active { background: #2980b9; }

    .content { flex: 1; padding: 24px; }

    h2 { color: #2c3e50; margin-bottom: 20px; font-size: 20px; }

    /* Messages */
    .messages { margin-bottom: 16px; }
    .msg {
      padding: 10px 16px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .msg.success { background: #d5f5e3; color: #1e8449; border: 1px solid #a9dfbf; }
    .msg.error   { background: #fadbd8; color: #922b21; border: 1px solid #f1948a; }

    /* Buttons */
    .btn {
      padding: 9px 18px;
      background: #2980b9;
      color: white;
      border: none;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      display: inline-block;
    }
    .btn:hover { background: #2471a3; }
    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 3px;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      border: none;
      color: white;
    }

    /* Table */
    .table-box {
      background: white;
      border-radius: 6px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .table-box h3 { font-size: 16px; color: #2c3e50; margin-bottom: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      background: #f5f6fa;
      padding: 10px 12px;
      text-align: left;
      color: #555;
      border-bottom: 2px solid #eee;
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    .badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-green  { background: #d5f5e3; color: #1e8449; }
    .badge-blue   { background: #d6eaf8; color: #1a5276; }
    .badge-yellow { background: #fef9e7; color: #9a7d0a; }
    .badge-red    { background: #fadbd8; color: #922b21; }
    .badge-gray   { background: #f0f0f0; color: #555; }

    .actions { display: flex; gap: 6px; }

    /* Form */
    .form-box {
      background: white;
      padding: 28px;
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      max-width: 700px;
    }
    .form-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; flex: 1; min-width: 180px; }
    label { font-size: 13px; color: #555; margin-bottom: 5px; }
    input, select, textarea {
      padding: 9px 11px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2980b9;
    }
    textarea { resize: vertical; height: 80px; }
    .section-title {
      font-size: 15px;
      font-weight: bold;
      color: #2980b9;
      margin: 20px 0 14px;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    .btn-row { margin-top: 20px; display: flex; gap: 12px; }
    .btn-cancel { background: #ccc; color: #333; }
    .btn-cancel:hover { background: #bbb; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <h1>🏥 Hospital Management System</h1>
    <a href="{% url 'logout' %}">Logout</a>
  </div>

  <div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
      <a href="{% url 'dashboard' %}"         class="{% block nav_dashboard %}{% endblock %}">📊 Dashboard</a>
      <a href="{% url 'patient_list' %}"      class="{% block nav_patients %}{% endblock %}">👥 Patients</a>
      <a href="{% url 'add_patient' %}"       class="{% block nav_add_patient %}{% endblock %}">➕ Add Patient</a>
      <a href="{% url 'doctor_list' %}"       class="{% block nav_doctors %}{% endblock %}">🩺 Doctors</a>
      <a href="{% url 'appointment_list' %}"  class="{% block nav_appointments %}{% endblock %}">📅 Appointments</a>
    </div>

    <!-- Main Content -->
    <div class="content">

      <!-- Flash Messages -->
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="msg {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}

      {% block content %}{% endblock %}

    </div>
  </div>

</body>
</html>
