<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Employee System</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        Name: <input type="text" name="name"><br><br>
        dept: <input type="text" name="dept"><br><br>
        salary: <input type="number" name="salary"><br><br>

        <button type="submit">ADD</button>
    </form>
    <h3 align="center">List</h3>
    <table border="2" align="center">
        <tr>
            <th>Name</th>
            <th>dept</th>
            <th>salary</th>
            <th>action</th>
        </tr>
        {% for e in Employees %}
        <tr>
            <td>{{e.name}}</td>
            <td>{{e.dept}}</td>
            <td>{{e.salary}}</td>
            <td>
                <a href="{% url 'update' e.id %}">EDIT</a>
                <a href="{% url 'delete' e.id %}">delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
