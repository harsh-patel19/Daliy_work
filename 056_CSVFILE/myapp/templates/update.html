<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>UPDATE System</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        Name: <input type="text" name="name" value="{Employees.name}"><br><br>
        dept: <input type="text" name="dept"  value="{Employees.dept}"><br><br>
        salary: <input type="number" name="salary" value="{Employees.salary}"><br><br>

        <button type="submit">UPDATE</button>
    </form>
</body>
</html>
