<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Coffee House – Place Order</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .order-page { padding: 40px; max-width: 600px; margin: 0 auto; }
    .order-page h1 { font-size: 2rem; margin-bottom: 28px; }

    .order-form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .order-summary {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 24px;
    }
    .order-summary h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .order-sum-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--text-primary);
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-sum-item:last-child { border: none; font-weight: 700; color: var(--accent); font-size: 1rem; }

    .success-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-msg .icon { font-size: 4rem; margin-bottom: 16px; }
    .success-msg h2 { color: var(--accent); margin-bottom: 8px; }
    .success-msg p { color: var(--text-secondary); margin-bottom: 20px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="{%url 'index'%}">☕ Coffee House</a>
  <ul class="nav-links">
    <li><a href="{%url 'index'%}">Home</a></li>
    <li><a href="{%url 'menu'%}">Menu</a></li>
    <li><a href="{%url 'about'%}" class="active">About</a></li>
    <li><a href="{%url 'contact'%}">Contact</a></li>
    <li><a href="{%url 'booking'%}">Booking</a></li>
    <li><a href="{%url 'login'%}">Login</a></li>
  </ul>
  <a class="nav-cart btn" href="{%url 'cart'%}">🛒 Cart <span class="cart-badge">0</span></a>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="order-page">
  <h1>Place Your Order</h1>

  <div id="orderForm">
    <div class="order-form-card">
      <div class="order-summary" id="orderSummary"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Phone number"/>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" id="address" placeholder="Your address"/>
      </div>
      <div class="form-group">
        <label>Select Payment</label>
        <select id="payment">
          <option>Card</option>
          <option>Cash on Delivery</option>
          <option>UPI</option>
          <option>Net Banking</option>
        </select>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <div class="success-msg" id="successMsg">
    <div class="icon">✅</div>
    <h2>Order Placed Successfully!</h2>
    <p>Thank you for your order. Your coffee is being prepared.</p>
    <a href="{url 'index'}" class="btn btn-primary">Back to Home</a>
  </div>
</div>

<footer>
  <p>© 2025 Coffee House. All rights reserved.</p>
</footer>

<script src="/static/js/script.js"></script>
<script>
function renderSummary() {
  const div = document.getElementById('orderSummary');
  if (Cart.items.length === 0) {
    div.innerHTML = '<p style="color:var(--text-muted)">No items in cart. <a href="menu.html" style="color:var(--accent)">Browse menu</a></p>';
    return;
  }
  const tax = Cart.total() * 0.08;
  div.innerHTML = `
    <h3>Order Summary</h3>
    ${Cart.items.map(i => `<div class="order-sum-item"><span>${i.name} x${i.qty}</span><span>$${(i.price*i.qty).toFixed(2)}</span></div>`).join('')}
    <div class="order-sum-item"><span>Total (incl. tax)</span><span>$${(Cart.total() + tax).toFixed(2)}</span></div>
  `;
}

function placeOrder() {
  const name = document.getElementById('fullName').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();

  if (!name || !phone || !address) {
    showToast('Please fill all fields!');
    return;
  }
  if (Cart.items.length === 0) {
    showToast('Your cart is empty!');
    return;
  }

  // Save order to localStorage for admin
  const orders = JSON.parse(localStorage.getItem('ch_orders') || '[]');
  orders.push({
    id: Date.now(),
    name, phone, address,
    payment: document.getElementById('payment').value,
    items: Cart.items,
    total: (Cart.total() * 1.08).toFixed(2),
    date: new Date().toLocaleDateString(),
    status: 'Pending'
  });
  localStorage.setItem('ch_orders', JSON.stringify(orders));
  Cart.clear();

  document.getElementById('orderForm').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
}

renderSummary();
</script>
</body>
</html>
