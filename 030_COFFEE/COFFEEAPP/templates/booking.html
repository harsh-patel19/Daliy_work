<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Coffee House – Table Booking</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .booking-page { padding: 40px; max-width: 560px; margin: 0 auto; }
    .booking-page h1 { font-size: 2rem; margin-bottom: 8px; }

    .booking-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-top: 24px;
    }

    .success-booking {
      display: none;
      text-align: center;
      padding: 50px 20px;
    }
    .success-booking .icon { font-size: 4rem; margin-bottom: 16px; }
    .success-booking h2 { color: var(--accent); margin-bottom: 8px; }
    .success-booking p { color: var(--text-secondary); margin-bottom: 20px; }
    .booking-detail {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 20px;
      text-align: left;
    }
    .booking-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .booking-detail-row span:last-child { color: var(--text-primary); }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="{%url 'index'%}">☕ Coffee House</a>
  <ul class="nav-links">
    <li><a href="{%url 'index'%}">Home</a></li>
    <li><a href="{%url 'menu'%}">Menu</a></li>
    <li><a href="{%url 'about'%}" class="active">About</a></li>
    <li><a href="{%url 'contact'%}">Contact</a></li>
    <li><a href="{%url 'booking'%}">Booking</a></li>
    <li><a href="{%url 'login'%}">Login</a></li>
  </ul>
  <a class="nav-cart btn" href="{%url 'cart'%}">🛒 Cart <span class="cart-badge">0</span></a>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="booking-page">
  <h1>Book a Table</h1>
  <p class="section-subtitle">Reserve your spot in advance</p>

  <div id="bookingForm">
    <div class="booking-card">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="bName" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="bPhone" placeholder="Phone number"/>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="bDate"/>
      </div>
      <div class="form-group">
        <label>Time</label>
        <input type="time" id="bTime"/>
      </div>
      <div class="form-group">
        <label>Number of Guests</label>
        <select id="bGuests">
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
          <option>6+</option>
        </select>
      </div>
      <div class="form-group">
        <label>Special Requests (Optional)</label>
        <textarea id="bNotes" rows="3" placeholder="Any special requests or notes..."></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="bookTable()">Book Now</button>
    </div>
  </div>

  <div class="success-booking" id="successBooking">
    <div class="icon">🎉</div>
    <h2>Table Booked!</h2>
    <p>Your reservation is confirmed. See you soon!</p>
    <div class="booking-detail" id="bookingDetails"></div>
    <a href="{%url 'index'%}" class="btn btn-primary">Back to Home</a>
  </div>
</div>

<footer>
  <p>© 2025 Coffee House. All rights reserved.</p>
</footer>

<script src="/static/js/script.js"></script>
<script>
// Set min date to today
document.getElementById('bDate').min = new Date().toISOString().split('T')[0];

function bookTable() {
  const name = document.getElementById('bName').value.trim();
  const phone = document.getElementById('bPhone').value.trim();
  const date = document.getElementById('bDate').value;
  const time = document.getElementById('bTime').value;
  const guests = document.getElementById('bGuests').value;
  const notes = document.getElementById('bNotes').value.trim();

  if (!name || !phone || !date || !time) {
    showToast('Please fill all required fields!');
    return;
  }

  // Save booking
  const bookings = JSON.parse(localStorage.getItem('ch_bookings') || '[]');
  bookings.push({ id: Date.now(), name, phone, date, time, guests, notes, status: 'Confirmed' });
  localStorage.setItem('ch_bookings', JSON.stringify(bookings));

  document.getElementById('bookingForm').style.display = 'none';
  const d = document.getElementById('successBooking');
  d.style.display = 'block';
  document.getElementById('bookingDetails').innerHTML = `
    <div class="booking-detail-row"><span>Name</span><span>${name}</span></div>
    <div class="booking-detail-row"><span>Date</span><span>${date}</span></div>
    <div class="booking-detail-row"><span>Time</span><span>${time}</span></div>
    <div class="booking-detail-row"><span>Guests</span><span>${guests}</span></div>
  `;
}
</script>
</body>
</html>
