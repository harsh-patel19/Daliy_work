<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>**Update Form**</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        Name: <input type="text" name="name" value="{{Products.name}}"><br><br>
        Qty: <input type="text" name="qty" value="{{Products.qty}}"><br><br>
        Price: <input type="number" name="price" value="{{Products.price}}"><br><br>
        
        {% if Products.image %}
            <img src="{{ Products.image.url }}" width="100" height="100"><br><br>
        {% endif %}
        
        New Image: <input type="file" name="image"><br><br>

        <button type="submit">UPDATE</button>
    </form>
