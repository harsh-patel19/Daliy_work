<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    Username: <input type="text" name="username"><br><br>
    Password: <input type="password" name="password"><br><br>
    <button type="submit">Login</button>
</form>

<p style="color:red;">{{ error }}</p>

<a href="/register/">Register</a>
